services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sistemas123
      POSTGRES_DB: db_trends
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      DEBUG: "true"
      API_PREFIX: /api
      DATABASE_URL: postgresql+asyncpg://postgres:sistemas123@postgres:5432/db_trends
      REDIS_URL: redis://redis:6379/0
      USE_REDIS_CACHE: "true"
      USE_CELERY: "true"
      SCHEDULER_INTERVAL_MINUTES: "30"
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      TIKTOK_HEADLESS: ${TIKTOK_HEADLESS:-true}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      # REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      # REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      # REDDIT_USER_AGENT: trendprompt-engine/1.0
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker -B -l info
    environment:
      APP_ENV: development
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:sistemas123@postgres:5432/db_trends
      REDIS_URL: redis://redis:6379/0
      USE_REDIS_CACHE: "true"
      USE_CELERY: "true"
      SCHEDULER_INTERVAL_MINUTES: "30"
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      TIKTOK_HEADLESS: ${TIKTOK_HEADLESS:-true}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      # REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      # REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      # REDDIT_USER_AGENT: trendprompt-engine/1.0
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/live-trends
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
